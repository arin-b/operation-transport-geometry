world:
  name: synthetic_dag
  n: 100
  failure_threshold: 0.50

runtime:
  preset: fast

seed:
  master: 0

nodes:
  selected:
    - detector
    - representation
    - measurement

domain_pairs:
  ordered: false

projection:
  use_aligned: true

uncertainty:
  terminal_noise: 0.03
  rollout_terminal_noise: 0.12
  hidden_nuisance: true

risk:
  mode: "true"
  noise_std: 0.10
  train_fraction: 0.70
  features: state
  sklearn_regressor: ridge
  sklearn_classifier: logistic
  ridge_alpha: 0.01
  logistic_max_iter: 500
  mlp_backend: sklearn
  mlp_hidden: [64, 64]
  mlp_max_iter: 400
  torch_epochs: 250
  torch_lr: 0.001

cost:
  mode: adaptive_node_pair
  weights:
    geometry: 1.0
    output: 1.0
    terminal: 1.0
    risk: 2.0
    invariance: 3.0
    operational_coordinate: 1.5
    nuisance: 0.15
  adaptive:
    risk_threshold: 0.06
    risk_scale: 0.04
    terminal_threshold: 0.10
    terminal_scale: 0.06
    failure_threshold: 0.05
    failure_scale: 0.04
    gate_bias: -0.50
    gate_weights:
      risk: 1.60
      terminal: 1.00
      failure: 0.80
    min_weights:
      geometry: 0.35
      terminal: 0.10
      risk: 0.20
      invariance: 0.15
      operational_coordinate: 0.25
      nuisance: 0.02
    nuisance_ratio_threshold: 1.00
    nuisance_gate_slope: 0.75
    quotient_nuisance_strength: 0.35
  node_profiles:
    detector:
      sensitivity_prior: 0.75
      geometry_scale: 0.85
      terminal_scale: 0.70
      risk_scale: 0.75
      invariance_scale: 0.85
      operational_scale: 0.85
      nuisance_scale: 0.50
    representation:
      sensitivity_prior: 0.90
      geometry_scale: 0.80
      terminal_scale: 0.70
      risk_scale: 0.85
      invariance_scale: 0.75
      operational_scale: 0.90
      nuisance_scale: 0.35
    measurement:
      sensitivity_prior: 1.30
      geometry_scale: 1.00
      terminal_scale: 1.30
      risk_scale: 1.25
      invariance_scale: 1.15
      operational_scale: 1.25
      nuisance_scale: 0.20

admissibility:
  mode: hybrid
  risk_tolerance: 0.25
  severe_risk_tolerance: 0.65
  operational_tolerance: 1.50
  severe_operational_tolerance: 3.00
  descriptor_tolerance: 1.50
  hard_threshold: 3.0
  soft_threshold: 2.0
  severe_threshold: 6.0
  adaptive_base_threshold: 3.0
  anchor_tolerance: 0.0
  anchor_weight: 2.0
  risk_weight: 1.0
  operational_weight: 1.0
  descriptor_weight: 0.5
  nuisance_weight: 0.0

transport:
  solver: auto
  epsilon: 0.05
  sinkhorn_iter: 500
  unbalanced_reg_m: 1.0
  unbalanced_cost_quantile: 0.85
  forbidden_cost: 1000000.0
  auto:
    enabled: true
    balanced_solver: masked_sinkhorn
    unbalanced_solver: unbalanced
    lp_audit: true
    lp_audit_n: 24
    high_risk_threshold: 0.50
    dangerous_mass_gap_threshold: 0.12
    min_target_danger_rate: 0.12
    risk_shift_threshold: 0.10

aggregation:
  mode: terminal_sensitivity_weighted
  weights:
    detector: 0.8
    representation: 1.0
    measurement: 1.3
  sensitivity_floor: 0.10
  evidence_floor: 0.05
  null_correction:
    false_separation_scale: 0.60

diagnostics:
  thresholds:
    risk_estimation_mae_ok: 0.20
    risk_calibration_error_ok: 0.20
    false_collapse_mass_ok: 0.15
    forbidden_mass_ok: 0.0001
    row_l1_error_ok: 0.001
    col_l1_error_ok: 0.001
    allowed_pair_fraction_min: 0.05
    row_feasible_fraction_min: 0.50
    col_feasible_fraction_min: 0.50
    harmless_shift_collapse_min: 0.30
    harmful_shift_detection_min: 0.10
    dangerous_unmatched_mass_min: 0.01
